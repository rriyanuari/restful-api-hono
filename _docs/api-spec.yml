openapi: 3.0.3
info:
  title: IT Asset Management API
  version: 1.0.0
  description: |
    OpenAPI contract for the IT Asset Management MVP.

    Scope:
    - Asset registration
    - Searchable inventory
    - Asset assignment tracking
    - Basic maintenance tracking
    - Asset file uploads

servers:
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Asset Categories
  - name: Category Attributes
  - name: Assets
  - name: Asset Assignments
  - name: Asset Maintenance
  - name: Asset Files
  - name: Users
  - name: Locations

paths:
  /asset-categories:
    get:
      tags:
        - Asset Categories
      summary: List asset categories
      operationId: listAssetCategories
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: q
          in: query
          description: Search by category name or slug.
          schema:
            type: string
        - name: parentId
          in: query
          description: Filter by parent category ID. Use `null` on the server side for root categories.
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCategoryListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Asset Categories
      summary: Create an asset category
      operationId: createAssetCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCategoryCreateRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /asset-categories/{categoryId}:
    get:
      tags:
        - Asset Categories
      summary: Get asset category detail
      operationId: getAssetCategory
      parameters:
        - $ref: '#/components/parameters/CategoryIdParam'
      responses:
        '200':
          description: Category detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCategoryDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Asset Categories
      summary: Update an asset category
      operationId: updateAssetCategory
      parameters:
        - $ref: '#/components/parameters/CategoryIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCategoryUpdateRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetCategoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
        - Asset Categories
      summary: Delete an asset category
      operationId: deleteAssetCategory
      parameters:
        - $ref: '#/components/parameters/CategoryIdParam'
      responses:
        '204':
          description: Category deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Category cannot be deleted because it is referenced by assets or child categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /asset-categories/{categoryId}/attributes:
    get:
      tags:
        - Category Attributes
      summary: List dynamic attributes for a category
      operationId: listCategoryAttributes
      parameters:
        - $ref: '#/components/parameters/CategoryIdParam'
      responses:
        '200':
          description: Attribute list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryAttributeListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Category Attributes
      summary: Create a dynamic attribute for a category
      operationId: createCategoryAttribute
      parameters:
        - $ref: '#/components/parameters/CategoryIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryAttributeCreateRequest'
      responses:
        '201':
          description: Attribute created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryAttributeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /category-attributes/{attributeId}:
    get:
      tags:
        - Category Attributes
      summary: Get category attribute detail
      operationId: getCategoryAttribute
      parameters:
        - $ref: '#/components/parameters/AttributeIdParam'
      responses:
        '200':
          description: Attribute detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryAttributeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Category Attributes
      summary: Update a category attribute
      operationId: updateCategoryAttribute
      parameters:
        - $ref: '#/components/parameters/AttributeIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryAttributeUpdateRequest'
      responses:
        '200':
          description: Attribute updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryAttributeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
        - Category Attributes
      summary: Delete a category attribute
      operationId: deleteCategoryAttribute
      parameters:
        - $ref: '#/components/parameters/AttributeIdParam'
      responses:
        '204':
          description: Attribute deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Attribute cannot be deleted because it already has recorded values.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /assets:
    get:
      tags:
        - Assets
      summary: Search and list assets
      operationId: listAssets
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: q
          in: query
          description: Search by asset code, brand, model, serial number, or notes.
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AssetStatus'
        - name: assignedUserId
          in: query
          schema:
            type: integer
            format: int64
        - name: locationId
          in: query
          schema:
            type: integer
            format: int64
        - name: purchaseDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: purchaseDateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Asset list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Assets
      summary: Create an asset
      operationId: createAsset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCreateRequest'
      responses:
        '201':
          description: Asset created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Referenced category, location, or user was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /assets/{assetId}:
    get:
      tags:
        - Assets
      summary: Get asset detail
      operationId: getAsset
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Assets
      summary: Update an asset
      operationId: updateAsset
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetUpdateRequest'
      responses:
        '200':
          description: Asset updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
        - Assets
      summary: Delete an asset
      operationId: deleteAsset
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      responses:
        '204':
          description: Asset deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Asset cannot be deleted because dependent records still exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /assets/{assetId}/attribute-values:
    get:
      tags:
        - Assets
      summary: List dynamic attribute values for an asset
      operationId: listAssetAttributeValues
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      responses:
        '200':
          description: Asset attribute values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetAttributeValueListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Assets
      summary: Upsert dynamic attribute values for an asset
      operationId: upsertAssetAttributeValues
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertAssetAttributeValuesRequest'
      responses:
        '200':
          description: Asset attribute values updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetAttributeValueListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Attribute does not belong to the asset category or violates attribute rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /assets/{assetId}/assignments:
    get:
      tags:
        - Asset Assignments
      summary: List assignment history for an asset
      operationId: listAssetAssignments
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Assignment history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetAssignmentListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Asset Assignments
      summary: Assign an asset to a user
      description: |
        Creates a new assignment history row and updates the asset's current `assigned_user_id`.
        The server should close any previously open assignment for the same asset.
      operationId: createAssetAssignment
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetAssignmentCreateRequest'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetAssignmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Asset or user was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Asset cannot be assigned in its current status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /asset-assignments/{assignmentId}/return:
    post:
      tags:
        - Asset Assignments
      summary: Mark an asset assignment as returned
      operationId: returnAssetAssignment
      parameters:
        - $ref: '#/components/parameters/AssignmentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetAssignmentReturnRequest'
      responses:
        '200':
          description: Assignment closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetAssignmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Assignment is already closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /assets/{assetId}/maintenance-logs:
    get:
      tags:
        - Asset Maintenance
      summary: List maintenance logs for an asset
      operationId: listAssetMaintenanceLogs
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Maintenance log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetMaintenanceLogListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Asset Maintenance
      summary: Create a maintenance log
      operationId: createAssetMaintenanceLog
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetMaintenanceLogCreateRequest'
      responses:
        '201':
          description: Maintenance log created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetMaintenanceLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /asset-maintenance-logs/{maintenanceLogId}:
    get:
      tags:
        - Asset Maintenance
      summary: Get a maintenance log
      operationId: getAssetMaintenanceLog
      parameters:
        - $ref: '#/components/parameters/MaintenanceLogIdParam'
      responses:
        '200':
          description: Maintenance log detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetMaintenanceLogResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Asset Maintenance
      summary: Update a maintenance log
      operationId: updateAssetMaintenanceLog
      parameters:
        - $ref: '#/components/parameters/MaintenanceLogIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetMaintenanceLogUpdateRequest'
      responses:
        '200':
          description: Maintenance log updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetMaintenanceLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Asset Maintenance
      summary: Delete a maintenance log
      operationId: deleteAssetMaintenanceLog
      parameters:
        - $ref: '#/components/parameters/MaintenanceLogIdParam'
      responses:
        '204':
          description: Maintenance log deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /assets/{assetId}/files:
    get:
      tags:
        - Asset Files
      summary: List files attached to an asset
      operationId: listAssetFiles
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      responses:
        '200':
          description: Asset file list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetFileListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Asset Files
      summary: Upload a file for an asset
      operationId: createAssetFile
      parameters:
        - $ref: '#/components/parameters/AssetIdParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - type
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  description: File classification such as invoice, warranty, photo, or manual.
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /asset-files/{fileId}:
    get:
      tags:
        - Asset Files
      summary: Get asset file metadata
      operationId: getAssetFile
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetFileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Asset Files
      summary: Delete an asset file
      operationId: deleteAssetFile
      parameters:
        - $ref: '#/components/parameters/FileIdParam'
      responses:
        '204':
          description: File deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /users:
    get:
      tags:
        - Users
      summary: List users
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: q
          in: query
          description: Search by user name, email, or department.
          schema:
            type: string
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Users
      summary: Create a user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get user detail
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Users
      summary: Update a user
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
        - Users
      summary: Delete a user
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '204':
          description: User deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: User cannot be deleted because they are referenced by asset assignments or current asset ownership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /locations:
    get:
      tags:
        - Locations
      summary: List locations
      operationId: listLocations
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: q
          in: query
          description: Search by location name.
          schema:
            type: string
        - name: parentId
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Location list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags:
        - Locations
      summary: Create a location
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationCreateRequest'
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /locations/{locationId}:
    get:
      tags:
        - Locations
      summary: Get location detail
      operationId: getLocation
      parameters:
        - $ref: '#/components/parameters/LocationIdParam'
      responses:
        '200':
          description: Location detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Locations
      summary: Update a location
      operationId: updateLocation
      parameters:
        - $ref: '#/components/parameters/LocationIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationUpdateRequest'
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags:
        - Locations
      summary: Delete a location
      operationId: deleteLocation
      parameters:
        - $ref: '#/components/parameters/LocationIdParam'
      responses:
        '204':
          description: Location deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Location cannot be deleted because it is referenced by assets or child locations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number starting from 1.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      description: Number of records per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    CategoryIdParam:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AttributeIdParam:
      name: attributeId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AssetIdParam:
      name: assetId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    AssignmentIdParam:
      name: assignmentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    MaintenanceLogIdParam:
      name: maintenanceLogId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    FileIdParam:
      name: fileId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    LocationIdParam:
      name: locationId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    AssetStatus:
      type: string
